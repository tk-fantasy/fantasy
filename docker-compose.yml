# Aether 编排：MQTT + Home Assistant + Aether 应用
#
# 启动：docker compose up -d --build
# 停止：docker compose down
# 访问：http://localhost:8010
#
# 首次启动前：
#   1. cp config.example.json config.json，把 ha.token 改成 HA 长期令牌
#      （ha.url 无需改，下方 HA_URL 环境变量会用容器服务名覆盖）
#   2. cp .env.example .env，填入 LLM / STT 密钥
services:
  mqtt:
    container_name: mosquitto
    image: eclipse-mosquitto:2
    ports:
      - "1884:1884"
    volumes:
      - ./mosquitto/config:/mosquitto/config
    restart: "no"

  homeassistant:
    container_name: aether-ha
    image: ghcr.io/home-assistant/home-assistant:stable
    ports:
      - "8123:8123"
    volumes:
      - ./ha_config:/config
    environment:
      TZ: Asia/Shanghai
    restart: "no"

  aether:
    container_name: aether
    build: .
    ports:
      - "8010:8010"   # 主服务（API + WebSocket + 前端 SPA）
      - "8011:8011"   # 冷启动进度端口（加载页轮询）
    env_file: .env
    environment:
      # 容器内通过 compose 服务名访问 HA，覆盖 config.json 里的 localhost
      HA_URL: http://homeassistant:8123
      TZ: Asia/Shanghai
    volumes:
      # 配置文件（首次从 config.example.json 复制，运行时写入持久化到宿主）
      - ./config.json:/aether/config.json
      # 运行时数据：SQLite 库、JWT 密钥、emoji 索引
      # 用 named volume 而非 bind mount —— Windows bind mount 不支持 SQLite WAL 共享内存
      - aether-data:/aether/app/data
      # 日志
      - ./logs:/aether/logs
      # 语义图构建产物
      - ./app/sg/output:/aether/app/sg/output
    depends_on:
      - mqtt
      - homeassistant
      - simulator
    restart: "no"

  simulator:
    # 虚拟设备模拟器：通过 MQTT 往 HA 报告灯/空调/窗帘等设备状态
    container_name: aether-simulator
    image: python:3.11-slim
    working_dir: /sim
    command: ["sh", "-c", "pip install --no-cache-dir -q -i https://pypi.tuna.tsinghua.edu.cn/simple paho-mqtt && python ha_simulator.py --docker"]
    volumes:
      - ./ha_config/ha_simulator.py:/sim/ha_simulator.py:ro
    depends_on:
      - mqtt
    restart: "no"

volumes:
  aether-data:
